{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-3">> WYSZUKIWANIE_SYGNAŁU</h2>
        <form method="POST" class="mb-4">
            <div class="input-group">
                <input type="text" name="symbol" class="form-control" placeholder="WPROWADŹ_TICKER (np. AAPL)" required value="{{ symbol or '' }}">
                <button class="btn btn-primary" type="submit">SKANUJ_RYNEK</button>
            </div>
        </form>

        {% if stock_info %}
        <div class="card mt-4 mb-5">
            <div class="card-header">
                [ ZNALEZIONO_CEL: {{ stock_info.symbol }} ]
            </div>
            <div class="card-body">
                <p class="card-text fs-3 text-light">OBECNA_WYCENA: <strong class="price-display">${{ stock_info.price }}</strong></p>                
                <div class="tradingview-widget-container mb-4" style="height: 300px;">
                  <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);width:100%"></div>
                  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
                  {
                  "symbol": "{{ stock_info.symbol }}",
                  "width": "100%",
                  "height": "100%",
                  "locale": "pl",
                  "dateRange": "1M",
                  "colorTheme": "dark",
                  "isTransparent": true,
                  "autosize": true,
                  "largeChartUrl": ""
                  }
                  </script>
                </div>
                
                <form action="{{ url_for('main.add_stock') }}" method="POST">
                    <input type="hidden" name="symbol" value="{{ stock_info.symbol }}">
                    <div class="mb-3 mt-3">
                        <label class="form-label text-muted">ZDEFINIUJ_POZIOM_ALARMOWY ($) [OPCJONALNIE]</label>
                        <input type="number" step="0.01" name="alert_price" class="form-control" placeholder="np. 150.50">
                    </div>
                    <button type="submit" class="btn btn-success w-100">DODAJ_DO_OBSERWACJI</button>
                </form>
            </div>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
