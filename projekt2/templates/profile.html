{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-3">> KONFIGURACJA_PROFILU</h2>
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">IDENTYFIKATOR (USERNAME)</label>
                        <input type="text" name="username" class="form-control" value="{{ current_user.username }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">KANAŁ_KOMUNIKACJI (E-MAIL DO ALERTÓW)</label>
                        <input type="email" name="email" class="form-control" value="{{ current_user.email }}" required>
                    </div>
                    <button type="submit" class="btn btn-info w-100 mt-3">ZAKTUALIZUJ_DANE</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
